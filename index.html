<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AeroBond Vault</title>
  <script src="https://tailwindcss.com"></script>
  <link href="https://googleapis.com" rel="stylesheet">
  <script src="https://jsdelivr.net"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            midnight: '#0F111A',
            slate_card: '#1E2235',
            cyan_accent: '#00E5FF',
            emerald_accent: '#22C55E'
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'DM Sans', sans-serif; background: #0F111A; color: #fff; }
    .glow-cyan { box-shadow: 0 0 20px rgba(0,229,255,0.3); }
    .glow-green { box-shadow: 0 0 20px rgba(34,197,94,0.3); }
    .lang-btn.active { background: #00E5FF; color: #0F111A; }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
    }
    .floating-logo { animation: float 3s ease-in-out infinite; }
  </style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/resizing_sdk.js" type="text/javascript"></script>
 <script src="/_sdk/telemetry_sdk.js"></script></head>
 <body data-template-id="__page-root" class="w-full min-h-screen text-white">
  <nav class="w-full px-6 py-4 flex items-center justify-between border-b border-white/10">
   <div class="flex items-center gap-3">
    <!-- Logo integrado en la barra de navegación -->
    <img src="logo.png" alt="AeroBond Logo" class="w-8 h-8 object-contain">
    <span data-template-id="nav-title" class="canva-text text-xl font-bold"></span>
   </div>
   <div class="flex items-center gap-3">
    <div class="flex rounded overflow-hidden border border-white/20"><button class="lang-btn active px-3 py-1 text-sm font-semibold transition">EN</button> <button class="lang-btn px-3 py-1 text-sm font-semibold text-gray-400 hover:text-white transition">ES</button> <button class="lang-btn px-3 py-1 text-sm font-semibold text-gray-400 hover:text-white transition">ZH</button>
    </div><button id="connect-wallet" data-template-id="connect-wallet-btn" class="canva-button px-4 py-2 rounded font-semibold text-sm transition hover:opacity-90 glow-cyan bg-cyan_accent text-midnight"></button>
   </div>
  </nav>
  <header class="w-full relative overflow-hidden">
   <div class="absolute inset-0 opacity-20"><img data-template-id="hero-bg-image" class="canva-image w-full h-full object-cover" loading="lazy">
   </div>
   <div class="relative z-10 max-w-7xl mx-auto px-6 py-20 md:py-28 grid md:grid-cols-2 gap-12 items-center">
    <div class="flex flex-col">
     <h1 data-template-id="hero-title" class="canva-text font-bold leading-tight mb-4 text-4xl md:text-5xl"></h1>
     <p data-template-id="hero-subtitle" class="canva-text mb-8 opacity-80 text-lg"></p>
     <div class="flex flex-wrap gap-4"><button data-template-id="cta-launch" class="canva-button px-6 py-3 rounded font-semibold glow-cyan transition hover:opacity-90 bg-cyan_accent text-midnight"></button> <button data-template-id="cta-docs" class="canva-button px-6 py-3 rounded font-semibold border-2 border-cyan_accent text-cyan_accent transition hover:opacity-80 bg-transparent"></button>
     </div>
    </div>
    <!-- Logo flotante principal de la cabecera -->
    <div class="flex items-center justify-center"><img src="logo.png" data-template-id="hero-logo" alt="AeroBond Vault" class="canva-image floating-logo h-64 w-auto drop-shadow-2xl" loading="lazy">
    </div>
   </div>
  </header>
  <section data-template-id="stats-bar" class="canva-section w-full border-y border-white/10 bg-slate_card">
   <div class="max-w-7xl mx-auto px-6 py-6 grid grid-cols-1 md:grid-cols-3 gap-6 text-center">
    <div>
     <p data-template-id="stat-tvl-label" class="canva-text text-sm opacity-60 mb-1"></p>
     <p data-template-id="stat-tvl-value" class="canva-text text-2xl font-bold text-cyan_accent"></p>
    </div>
    <div>
     <p data-template-id="stat-tlos-label" class="canva-text text-sm opacity-60 mb-1"></p>
     <div id="tlos-price-container" class="text-2xl font-bold text-cyan_accent">
      --
     </div>
    </div>
    <div>
     <p data-template-id="stat-btc-label" class="canva-text text-sm opacity-60 mb-1"></p>
     <p data-template-id="stat-btc-value" class="canva-text text-2xl font-bold text-emerald_accent"></p>
    </div>
   </div>
  </section>
  <main class="w-full max-w-7xl mx-auto px-6 py-16">
   <h2 data-template-id="mechanics-title" class="canva-text text-center font-bold mb-12 text-3xl"></h2>
   <div class="grid md:grid-cols-3 gap-6">
    <div data-template-id="card-seed" class="canva-card rounded-xl p-6 border border-white/10 bg-slate_card">
     <h3 data-template-id="card-seed-title" class="canva-text font-bold mb-3 text-xl text-cyan_accent"></h3>
     <p data-template-id="card-seed-desc" class="canva-text text-sm opacity-70"></p>
    </div>
    <div data-template-id="card-influencer" class="canva-card rounded-xl p-6 border border-white/10 bg-slate_card">
     <h3 data-template-id="card-influencer-title" class="canva-text font-bold mb-3 text-xl text-cyan_accent"></h3>
     <p data-template-id="card-influencer-desc" class="canva-text text-sm opacity-70"></p>
    </div>
    <div data-template-id="card-btc" class="canva-card rounded-xl p-6 border border-white/10 bg-slate_card">
     <h3 data-template-id="card-btc-title" class="canva-text font-bold mb-3 text-xl text-emerald_accent"></h3>
     <p data-template-id="card-btc-desc" class="canva-text text-sm opacity-70"></p>
    </div>
   </div>
  </main>
  <section class="w-full max-w-3xl mx-auto px-6 pb-16">
   <div data-template-id="vault-panel" class="canva-panel rounded-2xl p-8 border border-white/10 bg-slate_card">
    <h2 data-template-id="vault-title" class="canva-text font-bold mb-6 text-center text-2xl"></h2>
    <div class="mb-6"><label data-template-id="vault-input-label" class="canva-text text-sm opacity-70 mb-2 block" for="bond-input"></label> <input id="bond-input" type="number" placeholder="0.00" class="w-full bg-midnight border border-white/20 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-cyan_accent transition">
    </div>
    <div data-template-id="vault-breakdown" class="canva-card rounded-lg p-4 mb-6 border border-white/5 bg-midnight">
     <p data-template-id="vault-breakdown-text" class="canva-text text-sm leading-relaxed"></p>
    </div><button data-template-id="vault-execute-btn" class="canva-button w-full py-3 rounded-lg font-semibold glow-green transition hover:opacity-90 bg-emerald_accent text-midnight" onclick="handleExecute()"></button>
    <p id="execute-msg" class="text-center text-sm mt-3 text-emerald_accent hidden">Transaction simulated successfully.</p>
    <p id="execute-error" class="text-center text-sm mt-3 text-red-400 hidden"></p>
   </div>
  </section>
  <footer data-template-id="footer-section" class="canva-footer w-full border-t border-white/10 px-6 py-8 bg-[#0B0D14]">
   <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
    <div class="flex gap-6"><a href="https://x.com" target="_blank" rel="noopener noreferrer" class="text-gray-400 hover:text-cyan_accent transition"><i data-lucide="twitter" style="width:20px;height:20px"></i></a> <a href="https://t.me" target="_blank" rel="noopener noreferrer" class="text-gray-400 hover:text-cyan_accent transition"><i data-lucide="send" style="width:20px;height:20px"></i></a> <a href="https://github.com" target="_blank" rel="noopener noreferrer" class="text-gray-400 hover:text-cyan_accent transition"><i data-lucide="github" style="width:20px;height:20px"></i></a>
    </div>
    <p data-template-id="footer-disclaimer" class="canva-text text-xs text-center md:text-right opacity-50 max-w-lg"></p>
   </div>
  </footer>
  <script src="/_sdk/editing_sdk.js"></script>
