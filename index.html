        'vault-execute-btn': '执行即时支付',

        'error-msg': '请输入有效金额',
        'success-msg': '交易模拟成功。'
      }
    };

    let currentLang = 'en';

    function setLanguage(lang) {
      currentLang = lang;
      const langData = translations[lang];
      Object.keys(langData).forEach(key => {
        if (key === 'error-msg' || key === 'success-msg') return;
        const els = document.querySelectorAll(`[data-template-id="${key}"]`);
        els.forEach(el => {
          if (el.tagName === 'INPUT') {
            el.placeholder = langData[key];
          } else {
            el.textContent = langData[key];
          }
        });
      });
    }

    async function fetchTlosPrice() {
      try {
        const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=telos&vs_currencies=usd');
        const data = await response.json();
        const price = data.telos.usd;
        document.getElementById('tlos-price-container').textContent = '$' + price.toFixed(5);
      } catch (e) {
        document.getElementById('tlos-price-container').textContent = '$0.01135';
      }
    }

    fetchTlosPrice();
    setInterval(fetchTlosPrice, 60000);

    document.querySelectorAll('.lang-btn').forEach((btn, idx) => {
      const langs = ['en', 'es', 'zh'];
      btn.addEventListener('click', () => {
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        setLanguage(langs[idx]);
      });
    });

    document.getElementById('connect-wallet').addEventListener('click', function() {
      const isConnected = this.dataset.connected === 'true';
      if (!isConnected) {
        this.dataset.connected = 'true';
        this.textContent = '0xAB...CD (Connected)';
        this.style.opacity = '0.7';
        setTimeout(() => {
          this.dataset.connected = 'false';
          setLanguage(currentLang);
          this.style.opacity = '1';
        }, 3000);
      }
    });

    function handleExecute() {
      const input = document.getElementById('bond-input');
      const amount = parseFloat(input.value);
      const errorEl = document.getElementById('execute-error');
      const msgEl = document.getElementById('execute-msg');

      errorEl.classList.add('hidden');
      msgEl.classList.add('hidden');

      if (!amount || amount <= 0) {
        errorEl.textContent = translations[currentLang]['error-msg'];
        errorEl.classList.remove('hidden');
        return;
      }

      const btn = document.querySelector('[data-template-id="vault-execute-btn"]');
      btn.disabled = true;
      btn.style.opacity = '0.5';

      setTimeout(() => {
        msgEl.textContent = translations[currentLang]['success-msg'];
        msgEl.classList.remove('hidden');
        btn.disabled = false;
        btn.style.opacity = '1';
        input.value = '';
        setTimeout(() => msgEl.classList.add('hidden'), 3000);
      }, 1500);
    }

    setLanguage('en');
  </script>
